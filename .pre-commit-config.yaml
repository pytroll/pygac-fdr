repos:
  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0a3
    hooks:
      - id: isort
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        args: [--target-version, py314]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.14'
    hooks:
      - id: ruff-check
